<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timebox</title>
  <style>
    @font-face {
      font-family: 'Open Sans';
      src: url('./fonts/OpenSans-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e0dfd8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c8c7c0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Dev-only mock — only active when NOT inside Electron (e.g. Playwright browser test)
    if (!window.api) {
      const CLIENTS = [
        { id:'c1', name:'Acme Corp',    color:'#4A8FE8', billing:'hourly',  rate:85,   limitType:'weekly',  limitHours:20, carryover:false },
        { id:'c2', name:'The Blog',     color:'#E07B3A', billing:'fixed',   rate:null, limitType:'monthly', limitHours:40, carryover:true  },
        { id:'c3', name:'GreenTech SA', color:'#3DB33D', billing:'budget',  rate:70,   limitType:'monthly', limitHours:60, carryover:false },
        { id:'c4', name:'Studio Nova',  color:'#9B59B6', billing:'hourly',  rate:120,  limitType:'weekly',  limitHours:10, carryover:false },
      ];
      const PROJECTS = [
        { id:'p1', clientId:'c1', name:'Website Redesign',  budgetHours:80   },
        { id:'p2', clientId:'c1', name:'API Integration',   budgetHours:40   },
        { id:'p3', clientId:'c2', name:'Monthly Articles',  budgetHours:null },
        { id:'p4', clientId:'c3', name:'Dashboard MVP',     budgetHours:120  },
        { id:'p5', clientId:'c3', name:'Mobile App',        budgetHours:60   },
        { id:'p6', clientId:'c4', name:'Brand Identity',    budgetHours:30   },
      ];
      const RECURRING = [
        { id:'r1', clientId:'c1', slot:'am', day:0, hours:2 }, { id:'r11', clientId:'c3', slot:'am', day:0, hours:1.5 },
        { id:'r2', clientId:'c1', slot:'am', day:1, hours:3.5 }, { id:'r3', clientId:'c3', slot:'am', day:2, hours:3.5 },
        { id:'r4', clientId:'c3', slot:'am', day:3, hours:2 }, { id:'r12', clientId:'c1', slot:'am', day:3, hours:1.5 },
        { id:'r5', clientId:'c1', slot:'am', day:4, hours:3.5 }, { id:'r6', clientId:'c2', slot:'pm', day:0, hours:2.5 },
        { id:'r7', clientId:'c2', slot:'pm', day:1, hours:1.5 }, { id:'r13', clientId:'c4', slot:'pm', day:1, hours:1 },
        { id:'r8', clientId:'c4', slot:'pm', day:2, hours:2 }, { id:'r9', clientId:'c4', slot:'pm', day:3, hours:2 },
        { id:'r10', clientId:'c2', slot:'pm', day:4, hours:2.5 },
      ];
      const today = new Date(); today.setHours(0,0,0,0);
      const monday = new Date(today); const dow = monday.getDay(); monday.setDate(monday.getDate() - (dow === 0 ? 6 : dow - 1));
      function d(n) { const dt = new Date(monday); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
      const ENTRIES = [
        { id:'e1', projectId:'p1', date:d(0), hours:3.5, slot:'am', billed:true },
        { id:'e2', projectId:'p3', date:d(0), hours:2, slot:'pm', billed:true },
        { id:'e3', projectId:'p2', date:d(1), hours:4, slot:'am', billed:false },
        { id:'e5', projectId:'p4', date:d(2), hours:2, slot:'am', billed:false },
      ];
      let entries = [...ENTRIES];
      window.api = {
        getClients: async () => CLIENTS, saveClient: async () => {}, deleteClient: async () => {},
        getProjects: async () => PROJECTS, saveProject: async () => {}, deleteProject: async () => {},
        getRecurring: async () => RECURRING, saveRecurring: async () => {}, deleteRecurring: async () => {},
        getEntries: async (from, to) => entries.filter(e => e.date >= from && e.date <= to),
        saveEntry: async (e) => { const i = entries.findIndex(x => x.id === e.id); i >= 0 ? entries[i] = e : entries.push(e); },
        deleteEntry: async (id) => { entries = entries.filter(e => e.id !== id); },
        getWeekOverrides: async () => [], saveWeekOverride: async () => {}, deleteWeekOverride: async () => {},
        resetAllData: async () => {}, seedDemoData: async () => {},
      };
    }
  </script>
  <script type="module" src="./src/main.jsx"></script>
</body>
</html>
