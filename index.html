<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timebox</title>
  <style>
    @font-face {
      font-family: 'Open Sans';
      src: url('./fonts/OpenSans-Variable.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--tb-main-bg, #1e1e1e);
      -webkit-font-smoothing: antialiased;
    }

    [data-theme="light"] {
      --tb-sidebar-bg:            #f5f4ef;
      --tb-sidebar-border:        rgba(0,0,0,0.06);
      --tb-sidebar-text:          #2a2a2a;
      --tb-sidebar-muted:         rgba(0,0,0,0.35);
      --tb-sidebar-faint:         rgba(0,0,0,0.18);
      --tb-sidebar-nav-active-text: #1a1a1a;
      --tb-sidebar-label:         rgba(0,0,0,0.3);

      --tb-main-bg:               #F0EFE8;
      --tb-topbar-bg:             #F8F7F2;
      --tb-topbar-border:         #e8e7e0;
      --tb-topbar-text:           #383838;

      --tb-panel-bg:              #ffffff;
      --tb-panel-border:          #e8e7e0;
      --tb-panel-bg-soft:         #f8f7f2;
      --tb-panel-bg-subtle:       #f0efe8;

      --tb-text-primary:          #383838;
      --tb-text-secondary:        #888888;
      --tb-text-muted:            #aaaaaa;
      --tb-text-faint:            #bbbbbb;

      --tb-border:                #e8e7e0;
      --tb-border-soft:           #f0efe8;
      --tb-border-mid:            #e0dfd8;

      --tb-cell-bg:               #ffffff;
      --tb-cell-hover:            #fafaf8;
      --tb-cell-today:            #f8fff8;
      --tb-row-active:            #f5f5f0;
      --tb-cell-today-header:     #e8f5e8;
      --tb-cell-weekend:          #f8f7f2;
      --tb-cell-extra:            #faf9f5;
      --tb-cell-extra-today:      #fffdf8;

      --tb-input-bg:              #ffffff;
      --tb-input-border:          #dddddd;
      --tb-input-text:            #383838;

      --tb-navbtn-bg:             #ffffff;
      --tb-navbtn-hover:          #eeeee8;
      --tb-navbtn-border:         #e0dfd8;
      --tb-navbtn-text:           #383838;

      --tb-drag-over-bg:          #e8f0ff;
      --tb-reset-btn-bg:          #fff8f0;
      --tb-scrollbar-thumb:       #d0cfc8;
      --tb-scrollbar-hover:       #b8b7b0;
    }

    [data-theme="dark"] {
      --tb-sidebar-bg:            #161616;
      --tb-sidebar-border:        rgba(255,255,255,0.07);
      --tb-sidebar-text:          #e8e8e8;
      --tb-sidebar-muted:         rgba(255,255,255,0.62);
      --tb-sidebar-faint:         rgba(255,255,255,0.5);
      --tb-sidebar-nav-active-text: #ffffff;
      --tb-sidebar-label:         rgba(255,255,255,0.45);

      --tb-main-bg:               #1e1e1e;
      --tb-topbar-bg:             #242424;
      --tb-topbar-border:         #323232;
      --tb-topbar-text:           #e0e0e0;

      --tb-panel-bg:              #2a2a2a;
      --tb-panel-border:          #383838;
      --tb-panel-bg-soft:         #242424;
      --tb-panel-bg-subtle:       #2f2f2f;

      --tb-text-primary:          #e8e8e8;
      --tb-text-secondary:        #b8b8b8;
      --tb-text-muted:            #949494;
      --tb-text-faint:            #787878;

      --tb-border:                #363636;
      --tb-border-soft:           #303030;
      --tb-border-mid:            #404040;

      --tb-cell-bg:               #2a2a2a;
      --tb-cell-hover:            #313131;
      --tb-cell-today:            #1e2a1e;
      --tb-row-active:            #323232;
      --tb-cell-today-header:     #1a2e1a;
      --tb-cell-weekend:          #242424;
      --tb-cell-extra:            #272720;
      --tb-cell-extra-today:      #2a2515;

      --tb-input-bg:              #333333;
      --tb-input-border:          #484848;
      --tb-input-text:            #e0e0e0;

      --tb-navbtn-bg:             #2a2a2a;
      --tb-navbtn-hover:          #363636;
      --tb-navbtn-border:         #404040;
      --tb-navbtn-text:           #d0d0d0;

      --tb-drag-over-bg:          #1a1e35;
      --tb-reset-btn-bg:          #2e2015;
      --tb-scrollbar-thumb:       #444444;
      --tb-scrollbar-hover:       #555555;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--tb-scrollbar-thumb, #444); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--tb-scrollbar-hover, #555); }
  </style>
  <script>
    try {
      const pref = localStorage.getItem('timebox-theme') || 'dark';
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      const eff = pref === 'system' ? (mq.matches ? 'dark' : 'light') : pref;
      document.documentElement.setAttribute('data-theme', eff);
    } catch(e) {}
  </script>
</head>
<body>
  <div id="root"></div>
  <script>
    // Dev-only mock — only active when NOT inside Electron (e.g. Playwright browser test)
    if (!window.api) {
      const CLIENTS = [
        { id:'c1', name:'Acme Corp',    color:'#4A8FE8', billable:true,  billing:'hourly', rate:85,   limitType:'weekly', limitHours:20,  position:0 },
        { id:'c2', name:'The Blog',     color:'#E07B3A', billable:true,  billing:'fixed',  rate:null, limitType:'weekly', limitHours:10,  position:1 },
        { id:'c3', name:'GreenTech SA', color:'#3DB33D', billable:true,  billing:'hourly', rate:70,   limitType:'global', limitHours:200, position:2 },
        { id:'c4', name:'Studio Nova',  color:'#9B59B6', billable:true,  billing:'hourly', rate:120,  limitType:'global', limitHours:80,  position:3 },
      ];
      const PROJECTS = [
        { id:'p1', clientId:'c1', name:'Website Redesign',  description:'Restyling completo del sito pubblico: UX, UI e ottimizzazione mobile.',         budgetHours:80,   weeklyHours:10,   position:0 },
        { id:'p2', clientId:'c1', name:'API Integration',   description:'Integrazione REST con i sistemi ERP del cliente, autenticazione OAuth2.',        budgetHours:40,   weeklyHours:null, position:1 },
        { id:'p3', clientId:'c2', name:'Monthly Articles',  description:'Quattro articoli mensili su tech e produttività per il blog editoriale.',         budgetHours:null, weeklyHours:5,    position:0 },
        { id:'p4', clientId:'c3', name:'Dashboard MVP',     description:'Prima versione della dashboard IoT: grafici real-time e alert soglie sensori.',   budgetHours:120,  weeklyHours:null, position:0 },
        { id:'p5', clientId:'c3', name:'Mobile App',        description:'App iOS/Android per monitoraggio impianti in campo, offline-first.',              budgetHours:60,   weeklyHours:null, position:1 },
        { id:'p6', clientId:'c4', name:'Brand Identity',    description:'Logo, palette colori, tipografia e linee guida per il nuovo brand dello studio.', budgetHours:30,   weeklyHours:null, position:0 },
      ];
      const RECURRING = [
        { id:'r1', clientId:'c1', slot:'am', day:0, hours:2,   position:0 }, { id:'r11', clientId:'c3', slot:'am', day:0, hours:1.5, position:1 },
        { id:'r2', clientId:'c1', slot:'am', day:1, hours:3.5, position:0 }, { id:'r3',  clientId:'c3', slot:'am', day:2, hours:3.5, position:0 },
        { id:'r4', clientId:'c3', slot:'am', day:3, hours:2,   position:0 }, { id:'r12', clientId:'c1', slot:'am', day:3, hours:1.5, position:1 },
        { id:'r5', clientId:'c1', slot:'am', day:4, hours:3.5, position:0 }, { id:'r6',  clientId:'c2', slot:'pm', day:0, hours:2.5, position:0 },
        { id:'r7', clientId:'c2', slot:'pm', day:1, hours:1.5, position:0 }, { id:'r13', clientId:'c4', slot:'pm', day:1, hours:1,   position:1 },
        { id:'r8', clientId:'c4', slot:'pm', day:2, hours:2,   position:0 }, { id:'r9',  clientId:'c4', slot:'pm', day:3, hours:2,   position:0 },
        { id:'r10', clientId:'c2', slot:'pm', day:4, hours:2.5, position:0 },
      ];
      const today = new Date(); today.setHours(0,0,0,0);
      const monday = new Date(today); const dow = monday.getDay(); monday.setDate(monday.getDate() - (dow === 0 ? 6 : dow - 1));
      function d(n) { const dt = new Date(monday); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
      const ENTRIES = [
        { id:'e1', projectId:'p1', date:d(0), hours:3.5, billableHours:null, slot:'am', billed:true },
        { id:'e2', projectId:'p3', date:d(0), hours:2,   billableHours:null, slot:'pm', billed:true },
        { id:'e3', projectId:'p2', date:d(1), hours:4,   billableHours:3.5,  slot:'am', billed:false },
        { id:'e5', projectId:'p4', date:d(2), hours:2,   billableHours:0,    slot:'am', billed:false },
      ];
      let entries = [...ENTRIES];
      window.api = {
        getClients: async () => CLIENTS, saveClient: async () => {}, deleteClient: async () => {},
        getProjects: async () => PROJECTS, saveProject: async () => {}, deleteProject: async () => {},
        getRecurring: async () => RECURRING, saveRecurring: async () => {}, deleteRecurring: async () => {}, deleteRecurringByClient: async () => {},
        getEntries: async (from, to) => entries.filter(e => e.date >= from && e.date <= to),
        getProjectTotals: async () => { const t = {}; entries.forEach(e => { t[e.projectId] = (t[e.projectId] || 0) + e.hours; }); return t; },
        saveEntry: async (e) => { const i = entries.findIndex(x => x.id === e.id); i >= 0 ? entries[i] = e : entries.push(e); },
        deleteEntry: async (id) => { entries = entries.filter(e => e.id !== id); },
        getWeekOverrides: async () => [], getWeekOverridesRange: async () => [],
        saveWeekOverride: async () => {}, deleteWeekOverride: async () => {},
        freezeWeeksBeforeRecurringChange: async () => {},
        resetAllData: async () => {}, seedDemoData: async () => {},
        getDbPath: async () => '/Users/demo/Documents/Timebox/timebox.db',
        selectDbFile: async () => null,
        createNewDb: async () => null,
        saveDbCopy: async () => null,
        getTodoistToken: async () => '',
        setTodoistToken: async () => {},
        getTodoistCache: async (dates) => dates.map(d => ({ dateStr: d, tasks: [], syncedAt: null })),
        getAllTodoistCache: async () => [],
        setTodoistCache: async () => {},
        syncTodoist: async () => ({ byDate: {} }),
        importTodoistProjects: async () => ({ added: 0 }),
        getHttpPort: async () => 37373,
        checkCliInstalled: async () => false,
        installCli: async () => ({ ok: true }),
        checkMcpServerInstalled: async () => false,
        installMcpServer: async () => ({ ok: true }),
        checkMcpCodexInstalled: async () => false,
        installMcpCodex: async () => ({ ok: true }),
        checkMcpDesktopInstalled: async () => false,
        installMcpDesktop: async () => ({ ok: true }),
        checkMcpClaudeCodeInstalled: async () => false,
        installMcpClaudeCode: async () => ({ ok: true }),
        onDbChanged: () => () => {},
      };
    }
  </script>
  <script type="module" src="./src/main.jsx"></script>
</body>
</html>
